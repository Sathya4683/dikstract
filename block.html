<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>dikstract</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #000000;
      color: #ffffff;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 20px;
    }

    .container {
      max-width: 800px;
      width: 100%;
      text-align: center;
    }

    .video-container {
      margin-bottom: 40px;
    }

    video {
      width: 100%;
      max-width: 640px;
      background: #000;
      border: 1px solid #333;
    }

    .message {
      font-size: 28px;
      font-weight: 300;
      letter-spacing: 0.5px;
      margin-bottom: 40px;
      line-height: 1.4;
      display: none;
    }

    .actions {
      display: none;
      gap: 20px;
      justify-content: center;
    }

    button {
      background: transparent;
      border: 1px solid #ffffff;
      color: #ffffff;
      padding: 16px 48px;
      font-size: 16px;
      font-weight: 500;
      cursor: pointer;
      letter-spacing: 1px;
      text-transform: uppercase;
      transition: all 0.2s;
    }

    button:hover {
      background: #ffffff;
      color: #000000;
    }

    .error {
      font-size: 18px;
      color: #888;
      line-height: 1.6;
    }

    .loading {
      font-size: 16px;
      color: #666;
      letter-spacing: 2px;
    }
  </style>
</head>
<body>
  <div class="container">
    <div id="loading" class="loading">LOADING...</div>
    <div id="videoContainer" class="video-container" style="display: none;">
      <video id="video" autoplay></video>
    </div>
    <div id="message" class="message">
      Do you still want to continue?
    </div>
    <div id="actions" class="actions">
      <button id="continueBtn">Continue</button>
      <button id="closeBtn">Close Tab</button>
    </div>
    <div id="error" style="display: none;"></div>
  </div>

  <script src="block.js"></script>
</body>
</html>
